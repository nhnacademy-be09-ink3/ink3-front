<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ink3</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/output.css}">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100">
<div th:replace="~{layout/fragments/header :: headerFragment}"></div>
<main class="container mx-auto px-4 py-8">
    <div class="flex flex-col lg:flex-row gap-10">

        <!-- 왼쪽: 입력 -->
        <div class="flex-1 bg-white p-8 rounded-xl shadow">
            <!-- 주문 상품 목록 -->
            <section class="mb-8">
                <h2 class="text-2xl font-semibold mb-4">주문 상품</h2>

                <!-- 주문 상품 카드 목록 -->
                <div class="space-y-4">

                    <!-- 상품 1 -->
                    <div class="bg-gray-50 p-4 rounded-lg shadow text-sm">
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
                            <!-- 상품명 -->
                            <div>
                                <div class="text-gray-500 text-xs mb-1">상품명</div>
                                <div class="font-medium text-gray-800">스프링의 정석</div>
                            </div>
                            <!-- 수량 -->
                            <div>
                                <div class="text-gray-500 text-xs mb-1">수량</div>
                                <div>2개</div>
                            </div>
                            <!-- 가격 -->
                            <div>
                                <div class="text-gray-500 text-xs mb-1">가격</div>
                                <div>20,000원</div>
                            </div>
                            <!-- 포장지 선택 -->
                            <div>
                                <div class="text-gray-500 text-xs mb-1">포장지 선택</div>
                                <select class="ink-input-field w-full">
                                    <option>포장 없음</option>
                                    <option>포장지 A (+1,000원)</option>
                                    <option>포장지 B (+2,000원)</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- 상품 2 -->
                    <div class="bg-gray-50 p-4 rounded-lg shadow text-sm">
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
                            <div>
                                <div class="text-gray-500 text-xs mb-1">상품명</div>
                                <div class="font-medium text-gray-800">JPA 완벽 가이드</div>
                            </div>
                            <div>
                                <div class="text-gray-500 text-xs mb-1">수량</div>
                                <div>1개</div>
                            </div>
                            <div>
                                <div class="text-gray-500 text-xs mb-1">가격</div>
                                <div>25,000원</div>
                            </div>
                            <div>
                                <div class="text-gray-500 text-xs mb-1">포장지 선택</div>
                                <select class="ink-input-field w-full">
                                    <option>포장 없음</option>
                                    <option>포장지 A (+1,000원)</option>
                                    <option>포장지 B (+2,000원)</option>
                                </select>
                            </div>
                        </div>
                    </div>

                </div>

            </section>

            <!-- 주문자 정보 -->
            <section class="mb-8">
                <h2 class="text-2xl font-semibold mt-10 mb-4">주문자 정보</h2>

                <div class="bg-gray-50 p-4 rounded-lg shadow space-y-6 text-sm">

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block mb-1 text-sm font-medium text-gray-700">이름</label>
                            <input type="text" class="ink-input-field w-full" placeholder="홍길동">
                        </div>
                        <div>
                            <label class="block mb-1 text-sm font-medium text-gray-700">연락처</label>
                            <input type="text" class="ink-input-field w-full" placeholder="010-1234-5678">
                        </div>
                    </div>

                    <div>
                        <label class="block mb-1 text-sm font-medium text-gray-700">이메일</label>
                        <input type="email" class="ink-input-field w-full" placeholder="example@email.com">
                    </div>

                </div>

            </section>

            <!-- 배송지 정보 -->
            <section class="mb-8">
                <!-- 배송지 정보 -->
                <section class="mb-8">
                    <h2 class="text-2xl font-semibold mt-10 mb-4">배송지 정보</h2>

                    <!-- 배송지 입력 방식 라디오 -->
                    <div class="mb-4">
                        <label class="block mb-1 text-sm font-medium text-gray-700">배송지 입력 방식</label>
                        <div class="flex gap-4">
                            <label class="flex items-center space-x-2">
                                <input type="radio" name="addressType" value="search" checked class="accent-indigo-600">
                                <span>주소 검색</span>
                            </label>
                            <label class="flex items-center space-x-2">
                                <input type="radio" name="addressType" value="book" class="accent-indigo-600">
                                <span>주소록</span>
                            </label>
                        </div>
                    </div>

                    <!-- 주소 입력 필드 -->
                    <div class="bg-gray-50 p-4 rounded-lg shadow space-y-6 text-sm">

                        <!-- 수령인 & 연락처 -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block mb-1 text-sm font-medium text-gray-700">수령인</label>
                                <input type="text" class="ink-input-field w-full" placeholder="홍길동">
                            </div>
                            <div>
                                <label class="block mb-1 text-sm font-medium text-gray-700">연락처</label>
                                <input type="text" class="ink-input-field w-full" placeholder="010-9876-5432">
                            </div>
                        </div>

                        <!-- 주소 -->
                        <div class="flex flex-col gap-3">
                            <label class="block mb-1 text-sm font-medium text-gray-700">배송 주소</label>
                            <div class="flex flex-col space-y-[16px]">
                                <!-- 우편번호 + 버튼 -->
                                <div class="flex gap-2">
                                    <input type="text" id="postalCode" class="ink-input-field w-[30%]" placeholder="우편번호" readonly>
                                    <button type="button" onclick="execDaumPostcode()" class="ink-btn-primary text-sm px-4 py-2 h-full">
                                        우편번호 찾기
                                    </button>
                                </div>

                                <!-- 도로명 주소 -->
                                <input type="text" id="defaultAddress" class="ink-input-field w-full" placeholder="도로명 주소" readonly>

                                <!-- 상세 주소 -->
                                <input type="text" id="detailAddress" class="ink-input-field w-full" placeholder="상세 주소 입력">

                                <!-- 참고 주소 -->
                                <input type="text" id="extraAddress" class="ink-input-field w-full" placeholder="참고 주소 입력">
                            </div>
                        </div>

                        <!-- 희망 배송일 -->
                        <div>
                            <label class="block mb-1 text-sm font-medium text-gray-700">희망 배송일</label>
                            <input type="date" class="ink-input-field w-full">
                        </div>
                    </div>
                </section>

                <!-- 주소록 모달 -->
                <div id="addressModal"
                     class="fixed inset-0 bg-black/10 hidden flex items-center justify-center z-50">
                    <div class="bg-white rounded-lg shadow-lg p-6 w-full max-w-xl">
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-lg font-semibold">주소록</h2>
                            <button id="closeAddressModal" class="text-gray-500 hover:text-gray-700 text-xl leading-none">&times;</button>
                        </div>

                        <div class="overflow-x-auto">
                            <table class="w-full text-sm text-left border border-gray-200">
                                <thead class="bg-gray-100 text-gray-700">
                                <tr>
                                    <th class="px-4 py-2 border">선택</th>
                                    <th class="px-4 py-2 border">수령인</th>
                                    <th class="px-4 py-2 border">주소</th>
                                    <th class="px-4 py-2 border">우편번호</th>
                                    <th class="px-4 py-2 border">기본</th>
                                    <th class="px-4 py-2 border">선택</th>
                                </tr>
                                </thead>
                                <tbody id="modalAddressTableBody">
                                <tr th:each="addr : ${addressList}">
                                    <td class="px-4 py-2 border text-center">
                                        <input type="radio" name="selectedAddr">
                                    </td>
                                    <td class="px-4 py-2 border" th:text="${addr.name}">홍길동</td>
                                    <td class="px-4 py-2 border"
                                        th:text="${addr.defaultAddress + ' ' + addr.detailAddress + ' ' + (addr.extraAddress ?: '')}">주소</td>
                                    <td class="px-4 py-2 border" th:text="${addr.postalCode}">12345</td>
                                    <td class="px-4 py-2 border text-center" th:text="${addr.isDefault ? '기본' : ''}"></td>
                                    <td class="px-4 py-2 border text-center">
                                        <button type="button"
                                                class="ink-btn-primary text-sm px-2 py-1"
                                                th:attr="data-name=${addr.name},
                                                         data-postal-code=${addr.postalCode},
                                                         data-default-address=${addr.defaultAddress},
                                                         data-detail-address=${addr.detailAddress},
                                                         data-extra-address=${addr.extraAddress}">
                                            선택
                                        </button>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </section>


            <!-- 쿠폰 및 포인트 -->
            <section>
                <h2 class="text-2xl font-semibold mt-10 mb-4">쿠폰 및 포인트</h2>

                <div class="bg-gray-50 p-4 rounded-lg shadow space-y-6 text-sm">

                    <!-- 쿠폰 선택 -->
                    <div>
                        <label class="block mb-1 text-sm font-medium text-gray-700">사용 가능한 쿠폰</label>
                        <select class="ink-input-field w-full">
                            <option selected disabled>쿠폰을 선택하세요</option>
                            <option>WELCOME 10% 할인</option>
                            <option>무료배송 쿠폰</option>
                            <option>3천원 할인 쿠폰</option>
                        </select>
                    </div>

                    <!-- 포인트 입력 -->
                    <div>
                        <label class="block mb-1 text-sm font-medium text-gray-700">포인트 사용</label>
                        <div class="flex flex-col sm:flex-row gap-2">
                            <input
                                    type="number"
                                    class="ink-input-field w-full sm:w-[70%]"
                                    placeholder="사용할 포인트를 입력하세요"
                            />
                            <button
                                    type="button"
                                    class="ink-btn-primary w-full sm:w-[30%] text-sm"
                            >
                                적용
                            </button>
                        </div>
                        <p class="text-xs text-gray-500 mt-1">보유 포인트: <span class="text-gray-700 font-semibold">12,000P</span></p>
                    </div>
                </div>
            </section>
        </div>

        <!-- 오른쪽: 요약 -->
        <div class="w-full lg:w-[35%]">
            <div class="sticky top-6 bg-white p-6 rounded-xl shadow min-h-[75vh] flex flex-col justify-between">
                <div>
                    <h2 class="text-xl font-bold border-b pb-2 mb-4">주문 요약</h2>
                    <div class="space-y-2 text-sm mb-6">
                        <div class="flex justify-between"><span>스프링의 정석</span><span>2개 / 20,000원</span></div>
                        <div class="flex justify-between"><span>JPA 가이드</span><span>1개 / 25,000원</span></div>
                    </div>

                    <h2 class="text-xl font-bold border-b pb-2 mb-4">결제 내역</h2>
                    <div class="space-y-2 text-sm">
                        <div class="flex justify-between"><span>상품 총액</span><span>45,000원</span></div>
                        <div class="flex justify-between"><span>할인</span><span>-1,000원</span></div>
                        <div class="flex justify-between"><span>배송비</span><span>3,000원</span></div>
                        <div class="flex justify-between font-bold text-base"><span>최종 결제</span><span>47,000원</span></div>
                    </div>
                </div>

                <button class="ink-btn-primary mt-8 w-full text-base py-2">결제하기</button>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{layout/fragments/footer :: footerFragment}"></div>
</body>
</html>



<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const modal = document.getElementById("addressModal");
        const closeBtn = document.getElementById("closeAddressModal");
        const addressTypeRadios = document.querySelectorAll('input[name="addressType"]');

        // 주소 입력 방식이 '주소록'일 때 모달 열기
        addressTypeRadios.forEach(radio => {
            radio.addEventListener("change", (e) => {
                if (e.target.value === "book") {
                    modal.classList.remove("hidden");
                }else if (e.target.value === "search") {
                    // 수동 입력 선택 시 모든 필드 초기화
                    document.querySelector("input[placeholder='홍길동']").value = "";
                    document.querySelector("input[placeholder='010-9876-5432']").value = "";
                    document.getElementById("postalCode").value = "";
                    document.getElementById("defaultAddress").value = "";
                    document.getElementById("detailAddress").value = "";
                    document.getElementById("extraAddress").value = "";
                }
            });
        });

        // 모달 닫기
        closeBtn.addEventListener("click", () => {
            modal.classList.add("hidden");
        });

        // 주소록에서 선택 버튼 클릭 시 입력 필드 채우기
        document.querySelectorAll('button[data-name]').forEach(button => {
            button.addEventListener("click", (e) => {
                const btn = e.currentTarget;

                document.querySelector("input[placeholder='홍길동']").value = btn.dataset.name;
                document.getElementById("postalCode").value = btn.dataset.postalCode;
                document.getElementById("defaultAddress").value = btn.dataset.defaultAddress;
                document.getElementById("detailAddress").value = btn.dataset.detailAddress;
                document.getElementById("extraAddress").value = btn.dataset.extraAddress || "";

                modal.classList.add("hidden");
            });
        });
    });

    // 다음 주소 검색 API 실행
    function execDaumPostcode() {
        document.getElementById('postalCode').value = '';
        document.getElementById('defaultAddress').value = '';
        document.getElementById('detailAddress').value = '';
        document.getElementById('extraAddress').value = '';

        new daum.Postcode({
            oncomplete: function(data) {
                let fullAddress = data.roadAddress;
                let extra = '';

                if (data.addressType === 'R') {
                    if (data.bname) extra += data.bname;
                    if (data.buildingName) extra += (extra ? ', ' + data.buildingName : data.buildingName);
                }

                document.getElementById('postalCode').value = data.zonecode;
                document.getElementById('defaultAddress').value = fullAddress;
                document.getElementById('extraAddress').value = extra
            }
        }).open();
    }
</script>
