<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ink3</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/output.css}">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100">
<div th:replace="~{layout/fragments/header :: headerFragment}"></div>
<main class="container mx-auto px-4 py-8">

    <h1 class="text-2xl font-bold mb-6">나의 주문 내역</h1>

    <div class="space-y-6">
        <div th:each="order : ${currentPage.content}" class="bg-white p-6 rounded-xl shadow border border-gray-200">
            <!-- 주문 상단 -->
            <div class="flex justify-between items-center mb-4">
                <div class="text-gray-500 text-sm">
                    <span class="font-medium text-gray-800">주문번호:</span>
                    <span th:text="${order.orderUUID}">UUID</span>
                </div>
                <div class="text-sm font-semibold px-3 py-1 rounded-full"
                     th:classappend="${order.status.name()} == 'CONFIRMED' ? 'bg-yellow-100 text-yellow-800' :
                                 order.status.name() == 'SHIPPING' ? 'bg-blue-100 text-blue-800' :
                                 order.status.name() == 'DELIVERED' ? 'bg-green-100 text-green-800' :
                                 order.status.name() == 'REFUNDED' ? 'bg-gray-100 text-gray-600' :
                                 'bg-red-100 text-red-800'"
                     th:text="${order.status.label}">
                    상태
                </div>
            </div>

            <!-- 주문 정보 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm mb-4">
                <div>
                    <span class="text-gray-500">주문일시</span><br/>
                    <span th:text="${#temporals.format(order.orderedAt, 'yyyy-MM-dd HH:mm')}">2025-05-26 15:00</span>
                </div>
                <div>
                    <span class="text-gray-500">주문자</span><br/>
                    <span th:text="${order.ordererName + ' (' + order.ordererPhone + ')'}">홍길동 (010-1234-5678)</span>
                </div>
            </div>

            <!-- 버튼 -->
            <div class="flex gap-3">
                <a th:href="@{'/orders/' + ${order.id}}" class="ink-btn-outline text-sm">주문 상세</a>
                <a th:href="@{'/orders/' + ${order.id} + '/shipment'}" class="ink-btn-primary text-sm">배송 정보</a>
            </div>
        </div>
    </div>

    <!-- 페이지네이션 -->
    <div class="mt-10 flex justify-center">
        <nav class="inline-flex rounded-md shadow-sm" aria-label="Pagination">
            <a th:if="${!currentPage.first}" th:href="@{/me/orders(page=${currentPage.number - 1}, size=${currentPage.size})}"
               class="px-4 py-2 border border-gray-300 bg-white text-sm text-gray-700 hover:bg-gray-50 rounded-l-md">
                이전
            </a>
            <span class="px-4 py-2 border-t border-b border-gray-300 bg-white text-sm text-gray-800 font-semibold">
            [[${currentPage.number + 1}]] / [[${currentPage.totalPages}]]
        </span>
            <a th:if="${!currentPage.last}" th:href="@{/me/orders(page=${currentPage.number + 1}, size=${currentPage.size})}"
               class="px-4 py-2 border border-gray-300 bg-white text-sm text-gray-700 hover:bg-gray-50 rounded-r-md">
                다음
            </a>
        </nav>
    </div>


</main>
<div th:replace="~{layout/fragments/footer :: footerFragment}"></div>
</body>
</html>
