<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ink3</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/output.css(v=${#dates.createNow().getTime()})}" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100">
<div th:replace="~{layout/fragments/header :: headerFragment}"></div>

<main class="container mx-auto px-4 py-8">
    <div class="w-8/12 mx-auto flex flex-col space-y-6">
        <div th:replace="~{user/fragments/me-header :: meHeaderFragment}"></div>

        <!-- 좌우 1:3 레이아웃 -->
        <div class="flex gap-6">
            <!-- 좌측 메뉴 -->
            <div th:replace="~{user/fragments/me-menu :: meMenuFragment}"></div>

            <!-- 우측 콘텐츠 -->
            <div class="w-3/4 flex flex-col space-y-6">
                <h1 class="text-xl font-semibold text-gray-800">주문 내역</h1>

                <div th:if="${#lists.isEmpty(orderList)}" class="text-gray-500 text-center py-20 bg-white rounded-xl shadow">
                    주문 내역이 없습니다.
                </div>

                <div th:if="${!#lists.isEmpty(orderList)}" class="space-y-6">
                    <div th:each="order : ${orderList}" class="bg-white p-6 rounded-xl shadow border border-gray-100 space-y-4">
                        <!-- 주문 헤더 -->
                        <div class="flex justify-between items-center">
                            <div class="text-sm text-gray-600">
                                <span class="font-medium text-gray-800">주문번호:</span>
                                <span th:text="${order.orderUUID}">UUID</span>
                            </div>
                            <div th:switch="${order.status.name()}">
                                <span th:case="'CONFIRMED'" class="bg-yellow-100 text-yellow-800 inline-block px-3 py-1 text-xs font-semibold rounded-full" th:text="${order.status.label}">대기</span>
                                <span th:case="'SHIPPING'" class="bg-blue-100 text-blue-800 inline-block px-3 py-1 text-xs font-semibold rounded-full" th:text="${order.status.label}">배송중</span>
                                <span th:case="'DELIVERED'" class="bg-green-100 text-green-800 inline-block px-3 py-1 text-xs font-semibold rounded-full" th:text="${order.status.label}">배송완료</span>
                                <span th:case="'REFUNDED'" class="bg-red-100 text-red-800 inline-block px-3 py-1 text-xs font-semibold rounded-full" th:text="${order.status.label}">반품완료</span>
                                <span th:case="'CANCELLED'" class="bg-gray-200 text-gray-700 inline-block px-3 py-1 text-xs font-semibold rounded-full" th:text="${order.status.label}">취소</span>
                            </div>
                        </div>

                        <!-- 주문 상세 정보 -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm text-gray-700">
                            <div>
                                <span class="text-gray-500 block mb-1">주문일시</span>
                                <span th:text="${#temporals.format(order.orderedAt, 'yyyy-MM-dd HH:mm')}">2025-05-26 15:00</span>
                            </div>
                            <div>
                                <span class="text-gray-500 block mb-1">주문자</span>
                                <span th:text="${order.ordererName + ' (' + order.ordererPhone + ')'}">홍길동 (010-1234-5678)</span>
                            </div>
                        </div>

                        <!-- 버튼 -->
                        <div class="flex gap-3 mt-2">
                            <a th:href="@{'/orders/' + ${order.id}}"
                               class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-100 text-sm">
                                주문 상세
                            </a>
                            <a th:href="@{'/orders/' + ${order.id} + '/shipment'}"
                               class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 text-sm">
                                배송 정보
                            </a>
                        </div>
                    </div>
                </div>

                <!-- 페이징 -->
                <div class="mt-10 flex justify-center" th:if="${totalPages > 1}">
                    <nav class="inline-flex -space-x-px rounded-md shadow-sm" aria-label="Pagination">
                        <a th:href="@{'/me/orders?page=' + ${page - 1} + '&size=' + ${size}}"
                           th:classappend="${!hasPrevious} ? 'pointer-events-none text-gray-400 border-gray-200' : 'text-gray-600 hover:bg-gray-100 border-gray-300'"
                           class="px-3 py-2 border text-sm rounded-l-md">이전</a>

                        <span class="px-4 py-2 border-t border-b text-sm text-gray-800 bg-white font-medium"
                              th:text="${page + 1}">1</span>

                        <a th:href="@{'/me/orders?page=' + ${page + 1} + '&size=' + ${size}}"
                           th:classappend="${!hasNext} ? 'pointer-events-none text-gray-400 border-gray-200' : 'text-gray-600 hover:bg-gray-100 border-gray-300'"
                           class="px-3 py-2 border text-sm rounded-r-md">다음</a>
                    </nav>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{layout/fragments/footer :: footerFragment}"></div>
</body>
</html>
