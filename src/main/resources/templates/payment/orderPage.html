<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주문서</title>
    <style>
        body { font-family: Pretendard, sans-serif; margin: 0; padding: 20px; background: #f8f8f8; }
        .container {
            display: flex;
            max-width: 1200px;
            margin: auto;
            gap: 40px; /* 양쪽 공간 확보 */
        }

        .left, .right { padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .left { flex: 2.5; height: 100vh; overflow-y: auto; }
        .right {
            flex: 1.5;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: sticky;
            top: 20px;
            height: calc(100vh - 40px); /* 페이지 공간 채움 */
            gap: 40px; /* 주문 요약과 결제 내역 사이 간격 */
        }
        h2 { border-bottom: 1px solid #ddd; padding-bottom: 8px; margin-top: 0; }

        .row { display: flex; gap: 10px; }
        .row input { flex: 1; }

        label { display: block; margin: 8px 0 4px; }
        input, select { width: 100%; padding: 8px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 4px; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background: #f2f2f2; }

        .product-summary, .payment-summary { margin-bottom: 20px; }
        .product-item { display: flex; justify-content: space-between; margin-bottom: 8px; }

        .summary-line { display: flex; justify-content: space-between; margin: 4px 0; }

        button {
            width: 100%;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background: #218838; }
    </style>
</head>
<body>
<div class="container">

    <!-- 왼쪽: 입력 -->
    <div class="left">
        <h2>주문 상품</h2>
        <table>
            <thead>
            <tr>
                <th>상품명</th>
                <th>수량</th>
                <th>가격</th>
                <th>포장지 선택</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td>스프링의 정석</td>
                <td>2</td>
                <td>20,000원</td>
                <td>
                    <select>
                        <option>포장 없음</option>
                        <option>포장지 A (+1,000원)</option>
                        <option>포장지 B (+2,000원)</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>JPA 완벽 가이드</td>
                <td>1</td>
                <td>25,000원</td>
                <td>
                    <select>
                        <option>포장 없음</option>
                        <option>포장지 A (+1,000원)</option>
                        <option>포장지 B (+2,000원)</option>
                    </select>
                </td>
            </tr>
            </tbody>
        </table>


        <h2>주문자 정보</h2>
        <div class="row">
            <div>
                <label>이름</label>
                <input type="text" placeholder="홍길동">
            </div>
            <div>
                <label>연락처</label>
                <input type="text" placeholder="010-1234-5678">
            </div>
        </div>
        <div>
            <label>이메일</label>
            <input type="email" placeholder="example@email.com">
        </div>

        <h2>배송지 정보</h2>
        <div class="row">
            <div>
                <label>수령인</label>
                <input type="text" placeholder="홍길동">
            </div>
            <div>
                <label>연락처</label>
                <input type="text" placeholder="010-9876-5432">
            </div>
        </div>
        <label>주소</label>
        <input type="text" placeholder="서울시 강남구 역삼동 123">
        <label>상세 주소</label>
        <input type="text" placeholder="상세 주소 입력">
        <label>참고 주소</label>
        <input type="text" placeholder="참고 주소 입력">
        <label>희망 배송일</label>
        <input type="date">

        <h2>쿠폰 및 포인트</h2>
        <select><option>선택 안함</option></select>
        <input type="number" placeholder="포인트 입력">
    </div>

    <!-- 오른쪽: 요약 -->
    <div class="right">
        <div>
            <h2>주문 상품 요약</h2>
            <div class="product-summary">
                <div class="product-item"><span>스프링의 정석</span><span>2개 / 20,000원</span></div>
                <div class="product-item"><span>JPA 가이드</span><span>1개 / 25,000원</span></div>
            </div>
        </div>

        <div>
            <h2>결제 내역</h2>
            <div class="payment-summary">
                <div class="summary-line"><span>상품 총액</span><span>45,000원</span></div>
                <div class="summary-line"><span>할인</span><span>-1,000원</span></div>
                <div class="summary-line"><span>배송비</span><span>3,000원</span></div>
                <div class="summary-line" style="font-weight: bold;"><span>최종 결제 금액</span><span>47,000원</span></div>
            </div>
            <button onclick="location.href='/payments'">결제하기</button>
        </div>
    </div>

</div>
</body>
</html>
